<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="익스펜스">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>익스펜스 - 카드 관리</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-gray: #8e8e93;
            --border-color: #f2f2f7;
            --corp-color: #007aff; 
            --pers-color: #34c759; 
            --accent-red: #ff3b30;
            --active-color: var(--corp-color);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: var(--text-main);
            line-height: 1.4;
            -webkit-user-select: none;
            padding-bottom: 90px;
        }

        header {
            padding: 60px 20px 20px;
            background: #fff;
            position: sticky; top: 0; z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .main-title { font-size: 28px; color: var(--active-color); font-weight: 800; letter-spacing: -1px; transition: color 0.3s; }
        .header-nav { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px; }

        .month-selector { display: flex; align-items: center; gap: 15px; position: relative; }
        .nav-btn { background: none; border: none; font-size: 20px; color: var(--active-color); padding: 5px 10px; cursor: pointer; font-weight: bold; }
        
        .month-display-group { position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .current-month { font-size: 24px; font-weight: 800; color: var(--text-main); }
        #monthNavigator { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }

        .total-amount { font-size: 24px; font-weight: 800; text-align: right; }

        .action-bar { padding: 15px 20px; display: flex; justify-content: flex-end; }
        .btn-add { background: var(--active-color); color: white; border: none; padding: 12px 24px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }

        .list-container { padding: 0 20px; min-height: 300px; }
        .date-group { margin-top: 25px; font-size: 14px; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .date-group.sat { color: #007aff; }
        .date-group.sun { color: var(--accent-red); }

        /* --- 리스트 아이템 레이아웃 수정 시작 --- */
        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; /* 상단 정렬 */
            padding: 18px 0; 
            border-bottom: 1px solid #f9f9f9; 
            gap: 12px; /* 좌측 사용처와 우측 금액 사이 간격 */
        }
        .item-info { 
            flex: 1; /* 가용한 모든 가로 공간 차지 */
            min-width: 0; /* 줄바꿈을 위한 필수 설정 */
        }
        .item-info .title { 
            font-size: 16px; 
            font-weight: 600; 
            display: block;
            word-break: break-all; /* 영문/숫자 길어도 강제 줄바꿈 */
            white-space: normal; /* 자동 줄바꿈 허용 */
            line-height: 1.4;
        }
        .item-right { 
            text-align: right; 
            flex-shrink: 0; /* 우측 영역이 찌그러지지 않도록 고정 */
            display: flex;
            align-items: center;
            gap: 15px;
	
        }
        .amount { 
            font-size: 16px; 
            font-weight: 600; 
            white-space: nowrap; /* 금액은 절대 줄바꿈 되지 않음 */
        }
        .btn-edit { 
            font-size: 12px; 
            color: var(--active-color); 
            background: none; 
            border: none; 
            cursor: pointer; 
            padding: 0;
            white-space: nowrap;
            margin-top : 0;
        }
        /* --- 리스트 아이템 레이아웃 수정 끝 --- */

        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-gray); cursor: pointer; flex: 1; }
        .tab-item.active { color: var(--active-color); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 30px 20px 50px; box-sizing: border-box; }
        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        .input-display-wrapper { position: relative; width: 100%; }
        #inputDateDisplay { width: 100%; padding: 18px 45px 18px 18px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 17px; background: #f9f9fb; box-sizing: border-box; cursor: pointer; }
        .calendar-icon-pos { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; pointer-events: none; }
        input[type="number"], input[type="text"] { width: 100%; padding: 18px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 17px; box-sizing: border-box; background: #f9f9fb; outline: none; }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-save { background: var(--active-color); color: white; }
        .btn-delete { background: var(--accent-red); color: white; }

        .pill-btn { width: 100%; padding: 16px; border-radius: 35px; border: 1.5px solid #eee; background: #fff; margin-bottom: 12px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .warning-box { background-color: #fff0f0; border: 1px solid #ff3b30; border-radius: 12px; padding: 15px; margin: 20px 0; text-align: left; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <span class="main-title" id="pageTitle">법인카드 사용내역</span>
        </div>
        <div class="header-nav">
            <div class="month-selector">
                <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <div class="month-display-group">
                    <span id="currentMonthLabel" class="current-month"></span>
                    <input type="month" id="monthNavigator" onchange="jumpToMonth(this.value)">
                </div>
                <button class="nav-btn" onclick="document.getElementById('monthNavigator').showPicker()">❯</button>
            </div>
            <div class="total-amount" id="totalDisplay">0원</div>
        </div>
    </header>

    <div class="action-bar">
        <button class="btn-add" onclick="openModal()">내역 추가</button>
    </div>

    <div class="list-container" id="itemList"></div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="switchTab('corp')" id="tab-corp">
            <span style="font-size:22px">🏢</span><span style="font-size:11px; font-weight:600;">법인카드</span>
        </div>
        <div class="tab-item" onclick="switchTab('pers')" id="tab-pers">
            <span style="font-size:22px">👤</span><span style="font-size:11px; font-weight:600;">개인카드</span>
        </div>
        <div class="tab-item" onclick="switchTab('settings')" id="tab-settings">
            <span style="font-size:22px">⚙️</span><span style="font-size:11px; font-weight:600;">설정</span>
        </div>
    </nav>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" style="font-size:22px; font-weight:700; margin-bottom:25px;">내역 추가</div>
            <div class="input-group" onclick="document.getElementById('inputDate').showPicker()">
                <div class="input-display-wrapper">
                    <input type="text" id="inputDateDisplay" readonly>
                    <span class="calendar-icon-pos">📅</span>
                </div>
                <input type="date" id="inputDate" onchange="updateDateDisplay(this.value)" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
            </div>
            <input type="text" id="inputTitle" placeholder="사용처" style="margin-bottom:15px">
            <input type="number" id="inputAmount" placeholder="금액 (원)">
            <div class="modal-btns">
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteItem()">삭제</button>
                <button style="background:#f2f2f7;" onclick="closeModal()">취소</button>
                <button class="btn-save" onclick="saveItem()">저장</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div id="settingsMain">
                <div style="font-size:22px; font-weight:700; margin-bottom:25px;">설정 및 관리</div>
                <button class="pill-btn" onclick="exportData()">💾 전체 내역 백업 (JSON)</button>
                <button class="pill-btn" onclick="document.getElementById('fileInput').click()">📂 백업 불러오기</button>
                <button class="pill-btn" onclick="showInfo()">ℹ️ 정보</button>
                <input type="file" id="fileInput" hidden accept=".json" onchange="importData(event)">
                <button class="pill-btn" style="margin-top:20px; color:var(--accent-red); border-color:var(--accent-red);" onclick="closeSettings()">닫기</button>
            </div>

            <div id="infoDetail" style="display:none;">
                <div style="font-size:22px; font-weight:700; margin-bottom:20px;">정보</div>
                <p>만든이 : TAS 정태호 선임</p>
                <p>만든날짜 : 2026년 2월 어느날</p>
                <p>문의 : xogh554@naver.com</p>
                <div class="warning-box">
                    <span style="color:#ff3b30; font-weight:800; display:block; margin-bottom:8px;">⚠️ 데이터 보관 주의사항 (필독!)</span>
                    <p style="font-size:13px; margin:0; line-height:1.6;">
                        1. 이 앱은 서버 없이 개인의 핸드폰에만 저장됩니다.<br>
                        2. 인터넷 방문기록/캐시를 삭제하면 데이터가 전부 날아갑니다.<br>
                        3. 폰 분실/교체에 대비해 주기적으로 [내보내기] 하여 파일을 보관해주세요.
                    </p>
                </div>
                <div style="text-align: center; color: var(--accent-red); font-weight: 800; font-size: 18px; margin-bottom: 25px;">
                    Personal Expense Manager.
                </div>
                <button class="pill-btn" onclick="hideInfo()">뒤로 가기</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'corp';
        let corpItems = JSON.parse(localStorage.getItem('corpHistory')) || [];
        let persItems = JSON.parse(localStorage.getItem('persHistory')) || [];
        let viewDate = new Date();
        let editingId = null;

        const weekDaysFull = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const weekDaysShort = ['일', '월', '화', '수', '목', '금', '토'];

        document.addEventListener('DOMContentLoaded', () => { renderList(); });

        function changeMonth(diff) {
            viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + diff, 1);
            renderList();
        }

        function jumpToMonth(val) {
            if(!val) return;
            const [year, month] = val.split('-');
            viewDate = new Date(year, month - 1, 1);
            renderList();
        }

        function renderList() {
            const list = document.getElementById('itemList');
            const totalDisplay = document.getElementById('totalDisplay');
            const monthLabel = document.getElementById('currentMonthLabel');
            const monthNav = document.getElementById('monthNavigator');
            const viewYear = viewDate.getFullYear();
            const viewMonth = viewDate.getMonth();
            
            monthLabel.innerText = `${viewMonth + 1}월`;
            monthNav.value = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}`;
            list.innerHTML = '';
            let total = 0;
            let lastDate = '';

            const activeItems = currentMode === 'corp' ? corpItems : persItems;
            const filteredItems = activeItems.filter(item => {
                const itemDate = new Date(item.date);
                return itemDate.getFullYear() === viewYear && itemDate.getMonth() === viewMonth;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filteredItems.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#8e8e93; margin-top:80px;">내역이 없어요.</div>';
                totalDisplay.innerText = '0원';
                return;
            }

            filteredItems.forEach(item => {
                total += item.amount;
                if (item.date !== lastDate) {
                    const d = new Date(item.date);
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-group';
                    if (d.getDay() === 0) dateDiv.classList.add('sun');
                    if (d.getDay() === 6) dateDiv.classList.add('sat');
                    dateDiv.innerText = `${item.date.slice(2).replace(/-/g, '. ')} (${weekDaysShort[d.getDay()]})`;
                    list.appendChild(dateDiv);
                    lastDate = item.date;
                }
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.innerHTML = `
                    <div class="item-info"><span class="title">${item.title}</span></div>
                    <div class="item-right">
                        <span class="amount">${item.amount.toLocaleString()}원</span>
                        <button class="btn-edit" onclick="openModal(${item.id})">편집</button>
                    </div>
                `;
                list.appendChild(itemDiv);
            });
            totalDisplay.innerText = total.toLocaleString() + '원';
        }

        function switchTab(mode) {
            if(mode === 'settings') {
                hideInfo();
                document.getElementById('settingsModal').style.display = 'flex';
                return;
            }
            currentMode = mode;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            const root = document.documentElement;
            if(mode === 'corp') {
                root.style.setProperty('--active-color', 'var(--corp-color)');
                document.getElementById('pageTitle').innerText = '법인카드 사용내역';
            } else {
                root.style.setProperty('--active-color', 'var(--pers-color)');
                document.getElementById('pageTitle').innerText = '개인카드 사용내역';
            }
            renderList();
        }

        function showInfo() { document.getElementById('settingsMain').style.display = 'none'; document.getElementById('infoDetail').style.display = 'block'; }
        function hideInfo() { document.getElementById('settingsMain').style.display = 'block'; document.getElementById('infoDetail').style.display = 'none'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        function openModal(id = null) {
            editingId = id;
            document.getElementById('modal').style.display = 'flex';
            const activeItems = currentMode === 'corp' ? corpItems : persItems;
            if (id) {
                const item = activeItems.find(i => i.id === id);
                document.getElementById('modalTitle').innerText = (currentMode === 'corp' ? '법인' : '개인') + ' 내역 수정';
                document.getElementById('inputDate').value = item.date;
                document.getElementById('inputTitle').value = item.title;
                document.getElementById('inputAmount').value = item.amount;
                document.getElementById('deleteBtn').style.display = 'block';
            } else {
                document.getElementById('modalTitle').innerText = (currentMode === 'corp' ? '법인' : '개인') + ' 내역 추가';
                const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().split('T')[0];
                document.getElementById('inputDate').value = today;
                document.getElementById('inputTitle').value = '';
                document.getElementById('inputAmount').value = '';
                document.getElementById('deleteBtn').style.display = 'none';
            }
            updateDateDisplay(document.getElementById('inputDate').value);
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function updateDateDisplay(val) { document.getElementById('inputDateDisplay').value = val + ' ' + weekDaysFull[new Date(val).getDay()]; }
        
        function saveItem() {
            const date = document.getElementById('inputDate').value;
            const title = document.getElementById('inputTitle').value;
            const amount = parseInt(document.getElementById('inputAmount').value);
            if (!title || isNaN(amount)) return;
            let activeItems = currentMode === 'corp' ? corpItems : persItems;
            if (editingId) {
                const index = activeItems.findIndex(i => i.id === editingId);
                activeItems[index] = { id: editingId, date, title, amount };
            } else {
                activeItems.push({ id: Date.now(), date, title, amount });
            }
            localStorage.setItem(currentMode === 'corp' ? 'corpHistory' : 'persHistory', JSON.stringify(activeItems));
            if(currentMode === 'corp') corpItems = activeItems; else persItems = activeItems;
            renderList();
            closeModal();
        }

        function deleteItem() {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            let activeItems = currentMode === 'corp' ? corpItems : persItems;
            activeItems = activeItems.filter(i => i.id !== editingId);
            localStorage.setItem(currentMode === 'corp' ? 'corpHistory' : 'persHistory', JSON.stringify(activeItems));
            if(currentMode === 'corp') corpItems = activeItems; else persItems = activeItems;
            renderList();
            closeModal();
        }

        function exportData() {
            const backup = { corp: corpItems, pers: persItems };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `카드지출_통합백업_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.corp && parsed.pers) {
                        if(confirm('데이터를 불러올까요?')) {
                            corpItems = parsed.corp; persItems = parsed.pers;
                            localStorage.setItem('corpHistory', JSON.stringify(corpItems));
                            localStorage.setItem('persHistory', JSON.stringify(persItems));
                            renderList(); closeSettings();
                        }
                    }
                } catch (err) { alert('파일 오류'); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
